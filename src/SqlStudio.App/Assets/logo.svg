<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <linearGradient id="cylBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0090e0"/>
      <stop offset="100%" stop-color="#004080"/>
    </linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0090e0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80d8ff"/>
      <stop offset="100%" stop-color="#00b0e0"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed rounded background (macOS icon style) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.04" stroke="#00d2ff" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/><line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/><line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/><line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Database cylinder -->
  <g>
    <!-- Body -->
    <rect x="100" y="128" width="210" height="220" fill="url(#cylBody)" rx="2"/>
    <!-- Bottom ellipse -->
    <ellipse cx="205" cy="348" rx="105" ry="38" fill="#003060"/>
    <!-- Top ellipse -->
    <ellipse cx="205" cy="128" rx="105" ry="38" fill="url(#cylTop)"/>
    <!-- Top shine -->
    <ellipse cx="205" cy="122" rx="72" ry="22" fill="#fff" opacity="0.15"/>

    <!-- Data separator lines -->
    <ellipse cx="205" cy="198" rx="105" ry="30" fill="none" stroke="#00b8e8" stroke-width="1.2" opacity="0.4"/>
    <ellipse cx="205" cy="278" rx="105" ry="30" fill="none" stroke="#00b8e8" stroke-width="1.2" opacity="0.4"/>

    <!-- Data row bars -->
    <rect x="128" y="165" width="55" height="7" rx="3.5" fill="#00e5ff" opacity="0.55"/>
    <rect x="192" y="165" width="38" height="7" rx="3.5" fill="#00a8d6" opacity="0.35"/>
    <rect x="128" y="185" width="75" height="7" rx="3.5" fill="#00e5ff" opacity="0.4"/>
    <rect x="128" y="237" width="48" height="7" rx="3.5" fill="#00e5ff" opacity="0.5"/>
    <rect x="186" y="237" width="60" height="7" rx="3.5" fill="#00a8d6" opacity="0.3"/>
    <rect x="128" y="257" width="82" height="7" rx="3.5" fill="#00e5ff" opacity="0.35"/>
    <rect x="128" y="310" width="42" height="7" rx="3.5" fill="#00e5ff" opacity="0.45"/>
    <rect x="180" y="310" width="52" height="7" rx="3.5" fill="#00a8d6" opacity="0.3"/>
  </g>

  <!-- Magnifying glass -->
  <g>
    <!-- Glass circle - outer -->
    <circle cx="345" cy="315" r="72" fill="none" stroke="url(#glass)" stroke-width="11"/>
    <!-- Glass fill -->
    <circle cx="345" cy="315" r="58" fill="#00c8f0" opacity="0.06"/>
    <!-- Lens reflection -->
    <path d="M 312 288 Q 324 270 352 276" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.35" stroke-linecap="round"/>

    <!-- Handle -->
    <line x1="398" y1="370" x2="445" y2="418" stroke="url(#handle)" stroke-width="16" stroke-linecap="round"/>
    <line x1="400" y1="372" x2="443" y2="416" stroke="#d0d0d0" stroke-width="11" stroke-linecap="round"/>

    <!-- SQL text inside lens -->
    <text x="345" y="326" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="2">SQL</text>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="450" rx="120" ry="16" fill="#00d2ff" opacity="0.06"/>
</svg>
