<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="cylGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#004080"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#0090e0"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a0e8ff"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00d2ff" stroke-width="1">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Database cylinder - shadow -->
  <g filter="url(#shadow)">
    <!-- Cylinder body -->
    <rect x="108" y="140" width="200" height="200" rx="4" fill="url(#cylGrad2)"/>

    <!-- Cylinder top ellipse -->
    <ellipse cx="208" cy="140" rx="100" ry="36" fill="url(#topGrad)"/>

    <!-- Cylinder bottom ellipse -->
    <ellipse cx="208" cy="340" rx="100" ry="36" fill="#003870"/>

    <!-- Middle data lines -->
    <ellipse cx="208" cy="200" rx="100" ry="28" fill="none" stroke="#00a0e0" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="208" cy="270" rx="100" ry="28" fill="none" stroke="#00a0e0" stroke-width="1.5" opacity="0.5"/>

    <!-- Data row highlights -->
    <rect x="130" y="175" width="60" height="6" rx="3" fill="#00e5ff" opacity="0.6"/>
    <rect x="200" y="175" width="40" height="6" rx="3" fill="#00b4d8" opacity="0.4"/>
    <rect x="130" y="195" width="80" height="6" rx="3" fill="#00e5ff" opacity="0.4"/>
    <rect x="220" y="195" width="50" height="6" rx="3" fill="#00b4d8" opacity="0.3"/>
    <rect x="130" y="245" width="50" height="6" rx="3" fill="#00e5ff" opacity="0.5"/>
    <rect x="190" y="245" width="70" height="6" rx="3" fill="#00b4d8" opacity="0.35"/>
    <rect x="130" y="265" width="90" height="6" rx="3" fill="#00e5ff" opacity="0.3"/>
    <rect x="130" y="310" width="45" height="6" rx="3" fill="#00e5ff" opacity="0.4"/>
    <rect x="185" y="310" width="55" height="6" rx="3" fill="#00b4d8" opacity="0.3"/>

    <!-- Top ellipse shine -->
    <ellipse cx="208" cy="135" rx="70" ry="20" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Magnifying glass -->
  <g filter="url(#glow)">
    <!-- Glass circle -->
    <circle cx="340" cy="320" r="64" fill="none" stroke="url(#glassGrad)" stroke-width="10"/>
    <circle cx="340" cy="320" r="50" fill="#00d2ff" opacity="0.08"/>

    <!-- Inner lens reflection -->
    <path d="M 310 295 Q 320 280, 345 285" fill="none" stroke="#fff" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

    <!-- Handle -->
    <line x1="388" y1="368" x2="430" y2="410" stroke="url(#handleGrad)" stroke-width="14" stroke-linecap="round"/>
    <line x1="390" y1="370" x2="428" y2="408" stroke="#c0c0c0" stroke-width="10" stroke-linecap="round"/>

    <!-- SQL text inside lens -->
    <text x="340" y="330" font-family="monospace" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.9">SQL</text>
  </g>

  <!-- Accent glow at bottom -->
  <ellipse cx="256" cy="440" rx="140" ry="20" fill="#00d2ff" opacity="0.08"/>
</svg>
