name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Calculate version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }} || true
          git push origin ${{ steps.version.outputs.tag }} || true

  build-mac:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install FreeTDS
        run: brew install freetds

      - name: Build release
        run: swift build -c release

      - name: Create .app bundle and DMG
        run: bash build/build-mac.sh ${{ needs.version.outputs.version }}

      - name: Upload DMG
        uses: actions/upload-artifact@v5
        with:
          name: SQLExplorer-mac-dmg
          path: publish/SQLExplorer-*-mac.dmg

  release:
    needs: [version, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS DMG
        uses: actions/download-artifact@v5
        with:
          name: SQLExplorer-mac-dmg
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: SQL Explorer ${{ needs.version.outputs.version }}
          body: |
            ## SQL Explorer ${{ needs.version.outputs.version }}

            Native macOS SQL Server management app built with Swift + SwiftUI.

            ### What changed
            ${{ github.event.head_commit.message }}

            ### Download
            - **macOS**: `SQLExplorer-${{ needs.version.outputs.version }}-mac.dmg`

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - FreeTDS: `brew install freetds`
          files: |
            artifacts/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
