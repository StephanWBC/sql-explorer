name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev.$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT
          fi

      - name: Build macOS DMG
        run: |
          chmod +x build/build-mac.sh
          bash build/build-mac.sh ${{ steps.version.outputs.version }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: publish/*.dmg

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: publish/mac/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev.$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT
          fi

      - name: Publish Windows x64
        run: |
          dotnet publish src/SqlStudio.App/SqlStudio.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish/windows

      - name: Install WiX Toolset
        run: dotnet tool install -g wix

      - name: Build MSI
        run: |
          wix build build/SqlExplorer.wxs `
            -d PublishDir=publish\windows `
            -o publish/SQLExplorer-${{ steps.version.outputs.version }}-win-x64.msi
        continue-on-error: true

      - name: Create ZIP
        run: Compress-Archive -Path publish\windows\* -DestinationPath publish\SQLExplorer-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            publish/*.msi
            publish/*.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SQL Explorer v${{ steps.version.outputs.version }}
          body: |
            ## SQL Explorer v${{ steps.version.outputs.version }}

            Cross-platform SQL Server Management Tool for macOS and Windows.

            ### Downloads
            - **macOS**: `SQLExplorer-${{ steps.version.outputs.version }}-mac.dmg` — Open DMG, drag to Applications
            - **Windows MSI**: `SQLExplorer-${{ steps.version.outputs.version }}-win-x64.msi` — Run installer
            - **Windows Portable**: `SQLExplorer-${{ steps.version.outputs.version }}-win-x64.zip` — Extract and run

            ### Features
            - Connect to Azure SQL Database & local/Docker SQL Server
            - Microsoft Entra ID + SQL Authentication
            - Object Explorer with lazy-loaded tree
            - Query editor with T-SQL syntax highlighting & IntelliSense
            - Results grid with CSV export
            - Script generation (CREATE/ALTER)
            - Dark/Light theme
          files: |
            artifacts/mac-dmg/*
            artifacts/windows-installers/*
          draft: false
          prerelease: false
